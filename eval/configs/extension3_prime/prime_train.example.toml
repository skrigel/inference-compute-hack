# Example Prime Hosted Training config for Extension 3.
# Do not run this file until the no-credit readiness checks pass and the user approves Prime credit use.

name = "extension3-agent-loop-grpo-pilot"
model = "Qwen/Qwen3.5-2B"
loss = "rl"
max_steps = 50
batch_size = 64
rollouts_per_example = 8

# Optional warm-start after a failed/interrupted run.
# checkpoint_id = "..."

[sampling]
max_tokens = 256
temperature = 0.7

[checkpoints]
interval = 25
keep_cloud = 5

[adapters]
interval = 25
keep_last = 4

[val]
interval = 25
num_examples = 6
rollouts_per_example = 1

[[env]]
id = "inference/extension3-agent-loop"
args = { split = "train", max_examples = 12, include_hard = true }

[[eval.env]]
id = "inference/extension3-agent-loop"
args = { split = "eval", max_examples = 6, include_hard = true }
num_examples = 6
rollouts_per_example = 1
